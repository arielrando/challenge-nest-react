# Variables: copiá .env.example a .env en la raíz (Docker Compose las carga solas).

services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./database-data:/var/lib/postgresql/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '${POSTGRES_PUBLISHED_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '${API_PUBLISHED_PORT}:3000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3000}
      FRONTEND_DEV_PORT: ${FRONTEND_DEV_PORT:-5173}
      VITE_DEMO_DEFAULT_EMAIL: ${VITE_DEMO_DEFAULT_EMAIL:-}
      VITE_DEMO_DEFAULT_PASSWORD: ${VITE_DEMO_DEFAULT_PASSWORD:-}
      VITE_DEMO_CATEGORY_ID: ${VITE_DEMO_CATEGORY_ID:-1}
      VITE_DEMO_TITLE: ${VITE_DEMO_TITLE:-Producto demo}
      VITE_DEMO_CODE: ${VITE_DEMO_CODE:-DEMO-FE-001}
      VITE_DEMO_VARIATION_TYPE: ${VITE_DEMO_VARIATION_TYPE:-NONE}
      VITE_DEMO_DESCRIPTION: ${VITE_DEMO_DESCRIPTION:-Creado desde el frontend de prueba}
      VITE_DEMO_ABOUT_LINE: ${VITE_DEMO_ABOUT_LINE:-Demostración punta a punta}
      VITE_DEMO_DETAIL_CATEGORY: ${VITE_DEMO_DETAIL_CATEGORY:-Computers}
      VITE_DEMO_DETAIL_CAPACITY: ${VITE_DEMO_DETAIL_CAPACITY:-512}
      VITE_DEMO_DETAIL_CAPACITY_UNIT: ${VITE_DEMO_DETAIL_CAPACITY_UNIT:-GB}
      VITE_DEMO_DETAIL_CAPACITY_TYPE: ${VITE_DEMO_DETAIL_CAPACITY_TYPE:-SSD}
      VITE_DEMO_DETAIL_BRAND: ${VITE_DEMO_DETAIL_BRAND:-Acme}
      VITE_DEMO_DETAIL_SERIES: ${VITE_DEMO_DETAIL_SERIES:-X1}
    ports:
      - '${FRONTEND_PUBLISHED_PORT:-5173}:5173'
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api

volumes:
  frontend_node_modules:
